  <circle cx="60" cy="140" r="6" fill="oklch(0.488 0.243 264.376)" opacity="0.25"/>
  <circle cx="72" cy="138" r="5" fill="oklch(0.488 0.243 264.376)" opacity="0.2"/>
  
  <!-- Cotton right -->
  <circle cx="135" cy="130" r="8" fill="oklch(0.488 0.243 264.376)" opacity="0.3"/>
  <circle cx="140" cy="140" r="6" fill="oklch(0.488 0.243 264.376)" opacity="0.25"/>
  <circle cx="128" cy="138" r="5" fill="oklch(0.488 0.243 264.376)" opacity="0.2"/>
  
  <!-- Rice stalks left -->
  <line x1="55" y1="170" x2="75" y2="145" stroke="oklch(0.488 0.243 264.376)" stroke-width="2" opacity="0.4"/>
  <line x1="50" y1="175" x2="70" y2="150" stroke="oklch(0.488 0.243 264.376)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Rice stalks right -->
