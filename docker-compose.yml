version: '3.8'

services:
  api:
    build: .
    container_name: satudata-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=satudata
      - DB_PASSWORD=satudata
      - DB_NAME=satudata
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - NATS_URL=nats://nats:4222
      - JWT_SECRET=change-this-in-production
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - satudata-network

  postgres:
    image: postgres:16-alpine
    container_name: satudata-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=satudata
      - POSTGRES_PASSWORD=satudata
      - POSTGRES_DB=satudata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satudata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satudata-network

  redis:
    image: redis:7-alpine
    container_name: satudata-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - satudata-network

  minio:
    image: minio/minio:latest
    container_name: satudata-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - satudata-network

  nats:
    image: nats:latest
    container_name: satudata-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js
    networks:
      - satudata-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  satudata-network:
    driver: bridge
